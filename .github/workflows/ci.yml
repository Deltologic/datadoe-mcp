name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on:
      group: 'datadoe'
      labels: ['datadoe-small']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build the server
        run: yarn build
